name: Release

permissions:
   id-token: write
   contents: write

on:
   push:
      tags:
         - "*@*"

jobs:
   release:
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v6
           with:
              fetch-depth: 0

         - name: Validate and parse tag
           id: tag
           shell: bash
           run: |
              TAG="${GITHUB_REF_NAME}"

              # Strict format: package@x.y.z
              if [[ ! "$TAG" =~ ^[a-zA-Z0-9-]+@[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "Invalid tag format. Expected 'name@x.y.z'. Got: $TAG"
                exit 1
              fi

              PKG_NAME="${TAG%@*}"
              PKG_VERSION="${TAG##*@}"
              PKG_DIR="packages/${PKG_NAME}"

              if [[ ! -f "${PKG_DIR}/package.json" ]]; then
                echo "Package manifest not found: ${PKG_DIR}/package.json"
                exit 1
              fi

              PKG_JSON_NAME="$(node -p "require('./${PKG_DIR}/package.json').name")"
              if [[ "${PKG_JSON_NAME}" != "${PKG_NAME}" ]]; then
                echo "Tag package name (${PKG_NAME}) does not match package.json name (${PKG_JSON_NAME})"
                exit 1
              fi

              echo "pkg_name=${PKG_NAME}" >> "$GITHUB_OUTPUT"
              echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
              echo "pkg_dir=${PKG_DIR}" >> "$GITHUB_OUTPUT"

         - uses: actions/setup-node@v6
           with:
              node-version: lts/*
              registry-url: https://registry.npmjs.org/

         - name: Update npm
           run: npm install -g npm@latest

         - uses: pnpm/action-setup@v5
           with:
              version: latest

         - name: Install dependencies
           run: pnpm install --no-frozen-lockfile

         - name: Verify tag version matches package.json
           shell: bash
           run: |
              PKG_JSON_VERSION="$(node -p "require('./${{ steps.tag.outputs.pkg_dir }}/package.json').version")"
              TAG_VERSION="${{ steps.tag.outputs.pkg_version }}"

              if [[ "$PKG_JSON_VERSION" != "$TAG_VERSION" ]]; then
                echo "Version mismatch for ${{ steps.tag.outputs.pkg_name }}:"
                echo "package.json: $PKG_JSON_VERSION"
                echo "tag:          $TAG_VERSION"
                exit 1
              fi

         - name: Check if version already exists in npm
           id: npm_check
           shell: bash
           run: |
              PKG="${{ steps.tag.outputs.pkg_name }}"
              VER="${{ steps.tag.outputs.pkg_version }}"

              if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
                echo "exists=true" >> "$GITHUB_OUTPUT"
                echo "Version already published: ${PKG}@${VER}. Skipping publish."
              else
                echo "exists=false" >> "$GITHUB_OUTPUT"
                echo "Version not published yet: ${PKG}@${VER}. Publishing."
              fi

         - name: Generate changelog/release notes
           if: steps.npm_check.outputs.exists != 'true'
           run: pnpx changelogithub
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

         - name: Build package
           if: steps.npm_check.outputs.exists != 'true'
           run: pnpm -C "${{ steps.tag.outputs.pkg_dir }}" build

         - name: Verify tarball includes dist files
           if: steps.npm_check.outputs.exists != 'true'
           shell: bash
           working-directory: ${{ steps.tag.outputs.pkg_dir }}
           run: |
              PACK_OUTPUT="$(npm pack --dry-run 2>&1)"
              echo "$PACK_OUTPUT"

              if ! grep -q "dist/index.mjs" <<< "$PACK_OUTPUT"; then
                echo "Tarball does not include dist/index.mjs. Aborting publish."
                exit 1
              fi

              if ! grep -q "dist/index.d.mts" <<< "$PACK_OUTPUT"; then
                echo "Tarball does not include dist/index.d.mts. Aborting publish."
                exit 1
              fi

         - name: Publish package
           if: steps.npm_check.outputs.exists != 'true'
           working-directory: ${{ steps.tag.outputs.pkg_dir }}
           run: pnpm publish --access public --no-git-checks
           env:
              NPM_CONFIG_PROVENANCE: true

         - name: Publish skipped
           if: steps.npm_check.outputs.exists == 'true'
           run: echo "No publish needed; version already exists in npm."
